services:
  - type: web
    name: sentence-profiler-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python backend/download_nltk.py
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker backend.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NLTK_DATA
        value: /opt/render/project/src/backend/nltk_data
